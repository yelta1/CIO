<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer circle -->
  <circle cx="20" cy="20" r="18" stroke="#00D4FF" stroke-width="2"/>
  <!-- Concentric inner dashed ring -->
  <circle cx="20" cy="20" r="12" stroke="#00D4FF" stroke-width="1.2" stroke-dasharray="2 2" stroke-opacity="0.7"/>
  <!-- Central origin -->
  <circle cx="20" cy="20" r="2.5" fill="#00D4FF"/>
  <!-- Sweep line pointing top-left -->
  <line x1="20" y1="20" x2="10" y2="10" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Target spot -->
  <circle cx="10" cy="10" r="3" fill="#00D4FF"/>
</svg>